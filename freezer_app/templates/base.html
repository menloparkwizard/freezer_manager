<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{% block title %}{% endblock %} - Freezer Managera</title>
		<link rel="stylesheet" href="{{url_for('static', filename='bootstrap.min.css')}}" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	</head>
	<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Freezer Manager</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      	<span class="navbar-toggler-icon"></span>
    	</button>
			<div class="collapse navbar-collapse" id="navbarText">
				<ul class="navbar-nav flex-row flex-wrap bd-navbar-nav">
					<li class="nav-item">
						<a class="nav-link" href="#">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">Status</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">Config</a>
					</li>
				</ul>

				<!-- Navbar Right-Hand Side -->
				<div class="navbar-nav flex-row flex-wrap ms-md-auto">
					<div class="dropdown">
						<button class="btn dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
							<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
								<path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
								<path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
							</svg>
							{% if g.user %}
								{{g.user['username']}}
							{% else %}
							  Hello!
							{% endif %}
						</button>
						<ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
							{% if g.user %}
								<li class="dropdown-item">
										<a href="{{url_for('auth.logout')}}">Log Out</a>
								</li>
							{% else %}
								<li class="dropdown-item">
									<a href="{{url_for('auth.register')}}">Register</a>
								</li>
					      <li class="dropdown-item">
									<a href="{{url_for('auth.login')}}">Log In</a>
								</li>      
							{% endif %}
						</ul>
					</div>
				</div> <!-- Navbar RHS Finish -->

			</div>
		</div>
	</nav>

	<body>
		<header>
			{% block header %}{% endblock %}
		</header>
		{% for message in get_flashed_messages() %}
			<div class="flash">{{ message }}</div>
		{% endfor %}
		{% block content %}{% endblock %}		

		<!-- <footer class="bd-footer bg-body-tertiary">
			<div class="container text-body-secondary">
				<div class="row">
					
				</div>
			</div>
		</footer> -->

		<script src="{{url_for('static', filename='bootstrap.bundle.min.js')}}" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	</body>
</html>
